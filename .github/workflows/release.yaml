name: Release
on:
  workflow_dispatch:
    inputs:
      next-version:
        type: choice
        options:
          - bump-minor
          - bump-patch

jobs:
  build:
    uses: ./.github/workflows/build.yaml
    permissions:
      contents: read
      id-token: write
    with:
      mode: release

  release-to-github-and-bump:
    uses: gardener/cc-utils/.github/workflows/release.yaml@v1 # zizmor: ignore[unpinned-uses] -- same-org reusable workflow; intentionally allowed for now, planned to pin to a version in the future
    needs:
      - build
    secrets:
      slack-token: ${{ secrets.SLACK_APP_TOKEN_GARDENER_CICD }}
    permissions:
      contents: write
      id-token: write
      packages: write
    with:
      release-commit-target: branch
      next-version: ${{ inputs.next-version }}
      slack-channel-id: C01BKP30K1U # #sap-tech-gardenctl
      assets: |
        - name: gardenlogin_darwin_amd64
          type: ocm-resource
          id:
            name: gardenlogin
            os: darwin
            architecture: amd64
        - name: gardenlogin_darwin_arm64
          type: ocm-resource
          id:
            name: gardenlogin
            os: darwin
            architecture: arm64
        - name: gardenlogin_linux_amd64
          type: ocm-resource
          id:
            name: gardenlogin
            os: linux
            architecture: amd64
        - name: gardenlogin_linux_arm64
          type: ocm-resource
          id:
            name: gardenlogin
            os: linux
            architecture: arm64
        - name: gardenlogin_windows_amd64.exe
          type: ocm-resource
          id:
            name: gardenlogin
            os: windows
            architecture: amd64

  publish-to-package-repositories:
    permissions:
      contents: write
      actions:  read
    needs:
      - release-to-github-and-bump
    secrets:
      GARDENER_GITHUB_WORKFLOW_PKG_MNGR_APP_ID: ${{ secrets.GARDENER_GITHUB_WORKFLOW_PKG_MNGR_APP_ID }}
      GARDENER_GITHUB_WORKFLOW_PKG_MNGR_APP_PRIVATE_KEY: ${{ secrets.GARDENER_GITHUB_WORKFLOW_PKG_MNGR_APP_PRIVATE_KEY }}
    uses: ./.github/workflows/publish-to-package-repositories.yaml
    with:
      component-descriptor: ${{ needs.release-to-github-and-bump.outputs.component-descriptor }}
